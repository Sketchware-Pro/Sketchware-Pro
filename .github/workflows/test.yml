name: Import External PR / Commit

on:
  workflow_dispatch:
    inputs:
      url:
        description: "GitHub PR or Commit URL"
        required: true

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Parse URL
        id: parse
        run: |
          URL="${{ github.event.inputs.url }}"

          OWNER=$(echo $URL | cut -d'/' -f4)
          REPO=$(echo $URL | cut -d'/' -f5)

          if [[ "$URL" == *"/pull/"* ]]; then
            TYPE="pr"
            ID=$(echo $URL | cut -d'/' -f7)
          elif [[ "$URL" == *"/commit/"* ]]; then
            TYPE="commit"
            ID=$(echo $URL | cut -d'/' -f7)
          else
            echo "❌ Invalid URL"
            exit 1
          fi

          BRANCH="import-${TYPE}-${ID}-$(date +%s)"

          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # ✅ ALWAYS go to base branch first
      - name: Switch to base branch
        run: |
          BASE="${{ github.event.repository.default_branch }}"
          git checkout $BASE
          git pull origin $BASE

      - name: Add external remote
        run: |
          git remote add external https://github.com/${{ steps.parse.outputs.owner }}/${{ steps.parse.outputs.repo }}.git

      - name: Fetch external
        run: |
          git fetch external

      - name: Create new branch
        run: |
          git checkout -b ${{ steps.parse.outputs.branch }}

      - name: Apply changes
        run: |
          if [ "${{ steps.parse.outputs.type }}" = "pr" ]; then
            echo "🔄 Importing PR..."
            git fetch external pull/${{ steps.parse.outputs.id }}/head:external-pr
            git merge external-pr --allow-unrelated-histories -m "Merge external PR #${{ steps.parse.outputs.id }}"
          else
            echo "🔄 Importing commit..."
            git cherry-pick ${{ steps.parse.outputs.id }}
          fi

      - name: Push branch
        run: |
          git push origin ${{ steps.parse.outputs.branch }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: ${{ github.event.repository.default_branch }}
          branch: ${{ steps.parse.outputs.branch }}
          title: "Import ${{ steps.parse.outputs.type }}: ${{ steps.parse.outputs.id }}"
          body: |
            Imported from:
            ${{ github.event.inputs.url }}

            ✅ Binary-safe
            ⚠️ Please review before merging