name: Import Multiple PR/Commits → One Branch

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Multiple PR/Commit URLs (one per line)"
        required: false
      file:
        description: "Optional file path (e.g. urls.txt)"
        required: false

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Prepare URL list
        run: |
          URLS="${{ github.event.inputs.urls }}"
          FILE="${{ github.event.inputs.file }}"

          > list.txt

          [ ! -z "$URLS" ] && echo "$URLS" >> list.txt
          [ ! -z "$FILE" ] && [ -f "$FILE" ] && cat "$FILE" >> list.txt

          echo "---- URL LIST ----"
          cat list.txt

      - name: Go to base branch
        run: |
          BASE="${{ github.event.repository.default_branch }}"
          git checkout $BASE
          git pull origin $BASE

      - name: Create branch
        run: |
          BRANCH="import-multi-$(date +%s)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH

      - name: Apply URLs (skip duplicates)
        run: |
          while read URL; do

            [ -z "$URL" ] && continue
            echo "Processing: $URL"

            OWNER=$(echo $URL | cut -d'/' -f4)
            REPO=$(echo $URL | cut -d'/' -f5)

            git remote remove external 2>/dev/null || true
            git remote add external https://github.com/$OWNER/$REPO.git
            git fetch external

            if [[ "$URL" == *"/commit/"* ]]; then
              ID=$(echo $URL | cut -d'/' -f7)

              # ✅ Skip if already applied
              if git log --all --grep="$ID" | grep -q "$ID"; then
                echo "⏩ Skipping duplicate commit $ID"
                continue
              fi

              git cherry-pick $ID || echo "⚠️ Skipped (conflict or duplicate)"

            elif [[ "$URL" == *"/pull/"* ]]; then
              ID=$(echo $URL | cut -d'/' -f7)

              git fetch external pull/$ID/head:external-pr

              # ✅ Skip if already merged
              if git merge-base --is-ancestor external-pr HEAD; then
                echo "⏩ PR already merged $ID"
                continue
              fi

              git merge external-pr --allow-unrelated-histories || echo "⚠️ Merge conflict"
            fi

          done < list.txt

          git add .
          git commit -m "Imported multiple PR/Commits" || echo "No changes to commit"

      - name: Push branch
        run: |
          git push origin $BRANCH