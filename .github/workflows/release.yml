name: Publish Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Google Services JSON
        shell: bash
        env:
          JSON_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
        if: ${{ env.JSON_CONTENT != '' }}
        run: |
          printf 'GOOGLE_SERVICES_JSON<<EOF\n%s\nEOF\n' "$JSON_CONTENT" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        env:
          SKETCHUB_API_KEY: ${{ secrets.SKETCHUB_API_KEY }}
        run: ./gradlew assembleRelease

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        - name: Create or Update GitHub Release
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            REF_NAME: ${{ github.ref_name }}
            EVENT_NAME: ${{ github.event_name }}
          run: |
            tag_name="$REF_NAME"
            # Fallback tag name if triggered manually without a tag
            if [ "$EVENT_NAME" = "workflow_dispatch" ] && [[ ! "$tag_name" =~ ^v ]]; then
              tag_name="v-manual-$(date +'%Y%m%d-%H%M%S')"
            fi
          
          apk_file="app/build/outputs/apk/release/app-release.apk"
          release_apk="Sketchware-Pro-${tag_name}.apk"
          mv "$apk_file" "./$release_apk"
          
          echo "Publishing release for tag: $tag_name"
          
          # Try to create the release, or upload to it if it already exists
          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" "./$release_apk" --clobber
          else
            gh release create "$tag_name" "./$release_apk" \
              --title "Sketchware Pro $tag_name" \
              --notes "Automated release built from commit ${{ github.sha }}." \
              --generate-notes
          fi
